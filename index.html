<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklist de Contrôle Quotidien de la Salle Serveur</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 30px;
      color: #111827;
    }
    .container {
      max-width: 1100px;
      margin: auto;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
    }
    h1 {
      text-align: center;
      margin-bottom: 25px;
    }
    .meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 25px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      box-sizing: border-box;
    }
    .section {
      margin-top: 30px;
    }
    .section h2 {
      background: #2563eb;
      color: white;
      padding: 12px;
      border-radius: 8px;
      font-size: 18px;
    }
    .check-row {
      display: grid;
      grid-template-columns: minmax(0, 2.8fr) minmax(220px, 1fr);
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-bottom: 1px solid #e5e7eb;
      background: #f9fafb;
    }
    .check-row.header {
      font-weight: bold;
      background: #e5edff;
    }
    .status {
      text-align: center;
    }
    .problem-box {
      background: #fff7ed;
      border-left: 5px solid #f97316;
      padding: 15px;
      margin-top: 30px;
      border-radius: 8px;
    }
    button {
      margin-top: 25px;
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }

    .control-line {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
    }

    .control-text {
      flex: 1;
    }

    .control-status {
  display: flex;
  gap: 30px;
  align-items: center;
  flex-wrap: wrap;
  margin-top: 8px;
   }

    .control-status label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    min-width: 70px;
    margin: 0;
    font-weight: normal;
}

    @media (max-width: 800px) {
      .meta {
        grid-template-columns: 1fr;
      }
      .check-row {
        grid-template-columns: 1fr;
      }
      .control-line {
        flex-direction: column;
        gap: 10px;
      }
      .status {
        text-align: left;
      }
      .control-status {
          gap: 20px;
}

.control-status label {
  font-size: 18px;
}

.control-status input[type="radio"] {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
}
}
  </style>
</head>
<body>
  <div class="container">
    <h1>Checklist de Contrôle Quotidien de la Salle Serveur</h1>

    <form id="serverRoomChecklist">
      <div class="meta">
        <div>
          <label for="inspection_date">Date</label>
          <input type="date" id="inspection_date" name="inspection_date" required />
        </div>
        <div>
          <label for="inspector_name">Effectué par</label>
          <input type="text" id="inspector_name" name="inspector_name" required />
        </div>
        <div>
          <label for="inspection_time">Heure</label>
          <input type="time" id="inspection_time" name="inspection_time" required />
        </div>
      </div>

      <div id="checklist"></div>

      <div class="problem-box">
        <strong>🔧 En cas de problème :</strong>
        <p>Si un point de contrôle est en état KO, décrire le problème dans la colonne Commentaire et déclencher les actions correctives nécessaires.</p>
      </div>

      <button type="submit">Soumettre la checklist</button>
    </form>
  </div>

  <script>
    const sections = [
      {
        title: "1. Environnement & Climatisation",
        items: [
          ["temperature", "Température : Vérifier que la température se situe entre 18-27°C."],
          ["humidity", "Humidité : Vérifier que le taux d'humidité est entre 40-60%."],
          ["hvac", "Climatisation (HVAC) : Vérifier que le système de refroidissement est en marche et fonctionne correctement."],
          ["airflow", "Airflow : S'assurer que rien ne bloque la circulation d'air autour des baies et des équipements."],
          ["cleanliness", "Propreté : Vérifier l'absence de poussière excessive, de débris ou d'obstacles."]
        ]
      },
      {
        title: "2. Alimentation Électrique",
        items: [
          ["ups", "Onduleurs (UPS) : Vérifier qu'aucun message d'alerte ou de panne ne s'affiche sur les UPS et que leur fonctionnement est normal."],
          ["ups_alarm", "Alarme UPS : Vérifier qu'aucune alarme anormale n'est active."],
          ["power_cables", "Câbles d'alimentation : S'assurer que les câbles sont bien connectés et ne présentent pas de signes de dommages."]
        ]
      },
      {
        title: "3. Sécurité Physique",
        items: [
          ["access_control", "Accès : Vérifier que la porte de la salle est bien fermée et que le système de contrôle d'accès est fonctionnel."],
          ["cctv", "Caméras de surveillance (CCTV) : Vérifier que les caméras fonctionnent."],
          ["sensitive_areas", "Zones sensibles : S'assurer que les baies critiques et les zones de câblage sont correctement verrouillées et sécurisées."]
        ]
      },
      {
        title: "4. Matériel Physique",
        items: [
          ["server_lights", "Voyants des serveurs : Vérifier que tous les voyants des serveurs sont verts."],
          ["san_lights", "Voyants des disques (SAN) : Vérifier que les voyants du SAN ou des baies de stockage sont normaux."],
          ["nas_lights", "Voyants des disques (NAS) : Vérifier que les voyants du NAS ou des baies de stockage sont normaux."],
          ["ventilation", "Ventilation : Écouter pour détecter tout bruit anormal et vérifier que tous les ventilateurs tournent."],
          ["network_switches", "Infrastructure réseau (Switches) : Vérifier que les voyants des commutateurs sont normaux."],
          ["fortigate_silverpeak", "Fortigate & Silver Peak : Vérifier que les voyants sont normaux et qu'il n'y a pas d'alerte."]
        ]
      },
      {
        title: "5. Sauvegardes & Logiciels",
        items: [
          ["backups", "État des sauvegardes : Vérifier que les sauvegardes de la nuit précédente se sont déroulées sans erreur."],
          ["system_alerts", "Alertes système : Consulter les tableaux de bord de monitoring pour confirmer l'absence d'alertes critiques."],
          ["vms_servers", "Ordinateurs/Machines virtuelles : Vérifier que toutes les machines virtuelles ou serveurs critiques sont bien démarrés et répondent."]
        ]
      },
      {
        title: "6. Câblage & Organisation",
        items: [
          ["order", "Ordre : Vérifier qu'aucun câble ou objet inutile ne traîne."]
        ]
      }
    ];

    const checklist = document.getElementById("checklist");

    sections.forEach(section => {
      const wrapper = document.createElement("div");
      wrapper.className = "section";
      wrapper.innerHTML = `<h2>${section.title}</h2>
        <div class="check-row header">
          <div>Point de contrôle</div>
          <div></div>
        </div>`;

      section.items.forEach(([key, label]) => {
        wrapper.innerHTML += `
          <div class="check-row">
            <div class="control-line">
              <span class="control-text">${label}</span>
              <span class="control-status">
                <label><input type="radio" name="${key}_status" value="OK" required> OK</label>
                <label><input type="radio" name="${key}_status" value="KO"> KO</label>
              </span>
            </div>
            <div><input type="text" name="${key}_comment" placeholder="Commentaire"></div>
          </div>`;
      });

      checklist.appendChild(wrapper);
    });

    document.getElementById("serverRoomChecklist").addEventListener("submit", async function(e) {
  e.preventDefault();

 const form = new FormData(e.target);
const data = Object.fromEntries(form.entries());

const tg = window.Telegram?.WebApp;
tg?.ready();

const payload = {
  telegram_init_data: tg?.initData || "",
  Date: data.inspection_date,
  Heure: data.inspection_time,
  Nom: data.inspector_name,
 
  Temperature_status: data.temperature_status,
  temperature_comment: data.temperature_comment,

  humidity_status: data.humidity_status,
  humidity_comment: data.humidity_comment,

  hvac_status: data.hvac_status,
  hvac_comment: data.hvac_comment,

  Airflow: data.airflow_status,
  airflow_comment: data.airflow_comment,

  Proprete_status: data.cleanliness_status,
  Proprete_comment: data.cleanliness_comment,

  Onduleurs_UPS: data.ups_status,
  Onduleurs_UPS_comment: data.ups_comment,

  Alarme_UPS: data.ups_alarm_status,
  Alarme_UPS_comment: data.ups_alarm_comment,

  Cables_dalimentation: data.power_cables_status,
  Cables_dalimentation_comment: data.power_cables_comment,

  Acces: data.access_control_status,
  Acces_comment: data.access_control_comment,

  Cameras_de_surveillance_CCTV: data.cctv_status,
  Cameras_de_surveillance_comment: data.cctv_comment,

  Zones_sensibles: data.sensitive_areas_status,
  Zones_sensibles_comment: data.sensitive_areas_comment,

  Voyants_des_serveurs: data.server_lights_status,
  Voyants_des_serveurs_comment: data.server_lights_comment,

  Voyants_des_disques_SAN: data.san_lights_status,
  Voyants_des_disques_SAN_comment: data.san_lights_comment,

  Voyants_des_disques_NAS: data.nas_lights_status,
  Voyants_des_disques_NAS_comment: data.nas_lights_comment,

  Ventilation: data.ventilation_status,
  Ventilation_comment: data.ventilation_comment,

  Infrastructure_reseau: data.network_switches_status,
  Infrastructure_reseau_comment: data.network_switches_comment,

  Fortigate__Silver_Peak: data.fortigate_silverpeak_status,
  Fortigate__Silver_Peak_comment: data.fortigate_silverpeak_comment,

  Etat_des_sauvegardes: data.backups_status,
  Etat_des_sauvegardes_comment: data.backups_comment,

  Alertes_systeme: data.system_alerts_status,
  Alertes_systeme_comment: data.system_alerts_comment,

  OrdinateursMachines_virtuelles: data.vms_servers_status,
  OrdinateursMachines_virtuelles_comment: data.vms_servers_comment,

  Ordre: data.order_status,
  Ordre_comment: data.order_comment
};

try {
  const response = await fetch("/submit-checklist", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  });

  if (!response.ok) {
    throw new Error(await response.text());
  }

  alert("Checklist submitted successfully!");
  e.target.reset();

} catch (error) {
  console.error(error);
  alert(error.message);
}
});
    
  </script>
</body>
</html>
